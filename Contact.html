<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="CSS/Contact.css">
</head>
<body>
    <nav>
        <img src="Image/logo.png" class="logo" width="70">
        <a href="Home.html">Home</a>
        <a href="About.html">About</a>
        <a href="Skills.html">Skills</a>
        <a href="Contact.html">Contact</a>
    </nav>

    <div class="main-wrapper">
        <div class="container">
            <div class="box1">
                <h1 class="box1-title">Contact Me</h1>
                <p class="box1-subtitle">I am here to assist you</p>
                
                <div class="contact-item">
                    <img src="Image/contact.png" class="contact-icon">
                    <div class="contact-text">
                        <label>PHONE</label>
                        <span>+63 906 154 0072</span>
                    </div>
                </div>

                <div class="contact-item">
                    <img src="Image/email.png" class="contact-icon">
                    <div class="contact-text">
                        <label>EMAIL</label>
                        <span>occ.raagas.cristian@gmail.com</span>
                    </div>
                </div>

                <div class="contact-item">
                    <img src="Image/location.png" class="location">
                    <div class="location-text">
                        <label>LOCATION</label>
                        <span>Cagayan De Oro City</span>
                    </div>
                </div>
            </div>

            <div class="box2">
                <h1 class="box2-title">Get In Touch</h1>
                <p class="box2-subtitle">Feel free to reach out to me!</p>
                <form>
                    <input type="text" placeholder="Enter Name" required>
                    <input type="email" placeholder="Enter Email" required>
                    <input type="tel" placeholder="Enter Phone Number" required> 
                    <textarea placeholder="Message" rows="4" required></textarea>
                    <div class="button-container">
                        <button type="submit" class="submit-btn">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
